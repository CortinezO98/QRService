server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ────────────────────────────────────────
    # OWASP A05: Security Misconfiguration Prevention

    # Prevenir clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevenir MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer — no filtrar token por Referer header
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Content Security Policy
    # - default-src 'self': solo recursos propios
    # - img-src: permitir data: para QR SVG inline y blob: para descargas
    # - connect-src: la API misma (relativa) y Stripe
    # - style-src 'unsafe-inline': Tailwind necesita estilos inline
    # - frame-src: Stripe Checkout iframe
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob:;
        connect-src 'self' https://api.stripe.com;
        frame-src https://js.stripe.com https://hooks.stripe.com;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # HSTS — solo activar si usas HTTPS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Ocultar versión de nginx
    server_tokens off;

    # ── SPA routing ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # No cachear el index.html (siempre la versión más nueva)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ── Static assets (JS, CSS, fonts) — cache largo ────────────
    location ~* \.(js|css|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Images ──────────────────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # ── Bloquear acceso a archivos ocultos ──────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Health check ────────────────────────────────────────────
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
        access_log off;
    }
}