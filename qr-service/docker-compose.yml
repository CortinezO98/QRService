version: "3.9"

# ============================================================
# QR-as-a-Service — Docker Compose (Production-grade)
# SWEBOK v4: Software Construction + Configuration Management
# ============================================================

x-api-common: &api-common
  build:
    context: ./services/api
    dockerfile: Dockerfile
    target: production
  env_file: .env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - internal
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp

services:

  # ── API ──────────────────────────────────────────────────
  api:
    <<: *api-common
    container_name: qr_api
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w 4 --bind 0.0.0.0:8000
      --access-logfile - --error-logfile -
      --timeout 30 --keep-alive 5
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Async Worker (Celery) ─────────────────────────────────
  worker:
    <<: *api-common
    container_name: qr_worker
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info --concurrency=2
      --queues=default,emails,qr_generation
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Scheduler (Celery Beat) ───────────────────────────────
  scheduler:
    <<: *api-common
    container_name: qr_scheduler
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Database ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: qr_db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qr_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: qr_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - nginxlogs:/var/log/nginx
    depends_on:
      - api
    networks:
      - internal
      - external
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: qr_prometheus
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    networks:
      - internal
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: qr_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
    networks:
      - internal
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  nginxlogs:
  promdata:
  grafanadata:

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
