groups:
  - name: qr_service_alerts
    rules:

      # ── Availability ───────────────────────────────────────
      - alert: APIDown
        expr: up{job="qr-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "QR API is down"
          description: "API has been unreachable for more than 1 minute."

      # ── Error Rate ─────────────────────────────────────────
      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m])
          / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate (> 5%)"

      # ── Latency ───────────────────────────────────────────
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 2.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency above 2 seconds"

      # ── Rate Limiting ──────────────────────────────────────
      - alert: HighRateLimitHits
        expr: |
          rate(http_requests_total{status="429"}[5m]) > 10
        for: 2m
        labels:
          severity: info
        annotations:
          summary: "High rate-limit rejections — possible abuse"

      # ── Subscription Expiries ──────────────────────────────
      - alert: CeleryWorkerDown
        expr: up{job="celery"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Celery worker is down — subscription expiry tasks not running"
