global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: qr-service
    environment: production

scrape_configs:
  # ── FastAPI Application ────────────────────────────────────
  - job_name: "qr-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ── PostgreSQL ────────────────────────────────────────────
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # ── Redis ─────────────────────────────────────────────────
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  # ── Celery Workers (via Flower) ───────────────────────────
  - job_name: "celery"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["flower:5555"]

  # ── Nginx ─────────────────────────────────────────────────
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]

# ── Alert Rules ────────────────────────────────────────────
rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Configure Alertmanager if needed
