# ============================================================
# Nginx — Security-hardened Reverse Proxy
# OWASP: Security Misconfiguration Prevention
# ============================================================

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ── Hide Nginx version ─────────────────────────────────
    server_tokens off;

    # ── MIME types ─────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time '
                    '"$http_x_request_id"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Request Limits (DoS Protection) ───────────────────
    client_body_size 5m;          # Max upload size
    client_header_timeout 15s;
    client_body_timeout 15s;
    send_timeout 15s;

    # ── Rate Limiting Zones ────────────────────────────────
    # API: 30 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/m;
    # Auth endpoints: stricter (10 req/min — brute force protection)
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
    # QR redirect: generous (500/min for viral QRs)
    limit_req_zone $binary_remote_addr zone=redirect_zone:10m rate=500r/m;

    # ── SSL Configuration ──────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Upstream ───────────────────────────────────────────
    upstream qr_api {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect ──────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS Server ──────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name qrservice.com www.qrservice.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # ── Security Headers ────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'none'; object-src 'none';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ── Block Malicious User Agents ─────────────────────
        if ($http_user_agent ~* (nikto|sqlmap|nmap|masscan|zgrab)) {
            return 403;
        }

        # ── Auth Endpoints: Strict Rate Limit ───────────────
        location /api/v1/auth/ {
            limit_req zone=auth_zone burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://qr_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ── API Endpoints ───────────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://qr_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ── QR Redirect Endpoint (high traffic) ─────────────
        location /r/ {
            limit_req zone=redirect_zone burst=100 nodelay;

            proxy_pass http://qr_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Referer $http_referer;
        }

        # ── Health Check (no rate limit) ────────────────────
        location /health {
            proxy_pass http://qr_api;
            access_log off;
        }

        # ── Block common attack paths ───────────────────────
        location ~* \.(php|asp|aspx|jsp)$ {
            return 444;
        }

        location ~* /(wp-admin|wp-login|phpmyadmin|adminer) {
            return 444;
        }
    }
}