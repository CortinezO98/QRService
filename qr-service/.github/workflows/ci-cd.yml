name: CI/CD Pipeline — QR Service
# SWEBOK v4: Software Configuration Management — Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/qr-api

jobs:

  # ── Stage 1: Code Quality ─────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          cd services/api
          pip install ruff mypy

      - name: Ruff lint (style + errors)
        run: ruff check services/api/app

      - name: Ruff format check
        run: ruff format --check services/api/app

      - name: Mypy type check
        run: mypy services/api/app --ignore-missing-imports --strict

  # ── Stage 2: Security Scanning ────────────────────────────
  security-scan:
    name: Security Scan (OWASP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit SAST scan
        # SWEBOK v4: Software Security — Static Analysis
        run: bandit -r services/api/app -ll -x services/api/app/tests
        continue-on-error: false

      - name: Safety dependency vulnerability scan
        run: |
          cd services/api
          safety check -r requirements.txt --json > safety-report.json || true
          cat safety-report.json

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: safety-report.json

  # ── Stage 3: Unit Tests ────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "test-secret-key-minimum-32-characters-long-for-testing"
      POSTGRES_HOST: localhost
      POSTGRES_DB: test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      REDIS_HOST: localhost
      REDIS_PASSWORD: test_redis
      STRIPE_SECRET_KEY: sk_test_fake
      STRIPE_WEBHOOK_SECRET: whsec_fake
      STRIPE_ANNUAL_PRICE_ID: price_fake
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd services/api
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          cd services/api
          pytest app/tests/unit/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: services/api/coverage.xml

  # ── Stage 4: Integration Tests ────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
        ports:
          - 6379:6379

    env:
      SECRET_KEY: "test-secret-key-minimum-32-characters-long-for-testing"
      POSTGRES_HOST: localhost
      POSTGRES_DB: test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      REDIS_HOST: localhost
      REDIS_PASSWORD: ""
      STRIPE_SECRET_KEY: sk_test_fake
      STRIPE_WEBHOOK_SECRET: whsec_fake
      STRIPE_ANNUAL_PRICE_ID: price_fake
      ENVIRONMENT: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd services/api
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run integration tests
        run: |
          cd services/api
          pytest app/tests/integration/ -v --timeout=60

  # ── Stage 5: Docker Build & Scan ──────────────────────────
  docker-build:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, security-scan, unit-tests]
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (test stage — runs tests inside Docker)
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          target: testing
          push: false
          tags: qr-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          target: production
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha

      - name: Trivy container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1   # Fail on critical/high CVEs

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Stage 6: Deploy (main branch only) ────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to registry
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/qr-service
            docker compose pull api worker scheduler
            docker compose up -d --no-deps api worker scheduler
            docker compose exec api alembic upgrade head

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production  # Requires manual approval

    steps:
      - name: Deploy to production
        run: echo "Production deploy triggered — manual approval required via GitHub Environments"
